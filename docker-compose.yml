services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - .env.example
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env.example
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/quiz_builder?schema=public"
    ports:
      - "4000:4000"
    volumes:
      - .:/app
      - root_node_modules:/app/node_modules
      - backend_node_modules:/app/backend/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "npx prisma generate --schema backend/prisma/schema.prisma &&
      npx prisma migrate deploy --schema backend/prisma/schema.prisma &&
      npx tsx backend/prisma/seed.ts &&
      npm run dev:docker --workspace backend"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    env_file:
      - .env.example
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - root_node_modules:/app/node_modules
      - frontend_node_modules:/app/frontend/node_modules
    depends_on:
      - backend
    command: npm run dev:frontend

volumes:
  postgres_data:
  root_node_modules:
  backend_node_modules:
  frontend_node_modules:
